<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三人中国象棋</title>
    <script type="module" crossorigin src="./assets/index-DsDGWwzG.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CQbGgRyk.css">
  </head>
  <body>
    <section id="start-screen" class="start-screen">
      <div class="start-panel">
        <h1>三人中国象棋</h1>
        <fieldset class="rule-group mode-group">
          <legend>游戏模式</legend>
          <label class="rule-option mode-option">
            <input type="radio" name="game-mode" value="ai" checked />
            <span>
              <strong>AI对弈</strong>
              <small>你执魏国，蜀、吴由 AI 行棋</small>
            </span>
          </label>
          <label class="rule-option mode-option">
            <input type="radio" name="game-mode" value="online" />
            <span>
              <strong>联机在线</strong>
              <small>输入房间码加入，留空创建新局</small>
              <span class="online-room-field">
                <input id="online-room-code" type="text" maxlength="5" inputmode="numeric" pattern="[0-9]{5}" autocomplete="off" spellcheck="false" placeholder="5位房间码" />
                <output id="online-room-output" class="online-room-output"></output>
              </span>
            </span>
          </label>
        </fieldset>
        <button id="start-game" class="primary-action" type="button">开始</button>
        <details class="settings-details">
          <summary>对弈设置</summary>
          <fieldset class="rule-group">
            <legend>出局条件</legend>
            <label class="rule-option">
              <input type="radio" name="defeat-condition" value="checkmate" />
              <span>
                <strong>主公被将死</strong>
                <small>以无法解除将军判定出局</small>
              </span>
            </label>
            <label class="rule-option">
              <input type="radio" name="defeat-condition" value="capture" checked />
              <span>
                <strong>主公被吃掉</strong>
                <small>以实际吃子判定出局</small>
              </span>
            </label>
          </fieldset>
          <fieldset class="rule-group">
            <legend>出局棋子处理</legend>
            <label class="rule-option">
              <input type="radio" name="defeated-piece-mode" value="remove" />
              <span>
                <strong>移除</strong>
                <small>出局后棋子全部移除</small>
              </span>
            </label>
            <label class="rule-option">
              <input type="radio" name="defeated-piece-mode" value="block" checked />
              <span>
                <strong>障碍</strong>
                <small>出局棋子留在棋盘上并变为浅灰色</small>
              </span>
            </label>
            <label class="rule-option">
              <input type="radio" name="defeated-piece-mode" value="takeover" />
              <span>
                <strong>接管</strong>
                <small>吃掉主帅的国家接管出局方剩余棋子</small>
              </span>
            </label>
          </fieldset>
          <fieldset class="rule-group">
            <legend>AI难度</legend>
            <label class="rule-option">
              <input type="radio" name="ai-difficulty" value="easy" />
              <span>
                <strong>简单</strong>
                <small>反应更快，适合熟悉规则</small>
              </span>
            </label>
            <label class="rule-option">
              <input type="radio" name="ai-difficulty" value="medium" checked />
              <span>
                <strong>中等</strong>
                <small>攻守均衡，推荐日常对局</small>
              </span>
            </label>
            <label class="rule-option">
              <input type="radio" name="ai-difficulty" value="hard" />
              <span>
                <strong>困难</strong>
                <small>思考更深，挑战更高</small>
              </span>
            </label>
          </fieldset>
        </details>
      </div>
    </section>
    <main class="app-shell">
      <button id="undo-move" class="undo-button" type="button" disabled>悔棋</button>
      <button id="resign-game" class="resign-button" type="button" hidden>认输</button>
      <button id="show-settings" class="settings-button" type="button">退出游戏</button>
      <div id="status" class="status" aria-live="polite"></div>
      <canvas id="board" width="1100" height="1040" aria-label="三人中国象棋棋盘线框"></canvas>
    </main>
    <div id="confirm-dialog" class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-message" hidden>
      <div class="confirm-card">
        <h2 id="confirm-title">确认退出</h2>
        <p id="confirm-message">确定要退出吗？</p>
        <div class="confirm-actions">
          <button id="confirm-cancel" class="confirm-cancel" type="button">取消</button>
          <button id="confirm-ok" class="confirm-ok" type="button">确认退出</button>
        </div>
      </div>
    </div>
    <footer class="version-footer">v0.2.0 · 2026-05-08</footer>
  </body>
</html>
