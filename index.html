<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candie & Will</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-bottom: 2.5rem;
        }
        .nav {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nav a {
            text-decoration: none;
            color: inherit;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 1.5rem 2.5rem;
            text-align: center;
            transition: border-color 0.2s, box-shadow 0.2s;
            min-width: 200px;
        }
        .nav a:hover {
            border-color: #888;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .nav a .label {
            font-size: 1.1rem;
            font-weight: 500;
            display: block;
            margin-bottom: 0.3rem;
        }
        .nav a .desc {
            font-size: 0.85rem;
            color: #999;
        }
        footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: #bbb;
        }
    </style>
</head>
<body>
    <h1>Candie & Will</h1>
    <nav class="nav">
        <a href="mc-platformer/">
            <span class="label">方块跳跃</span>
            <span class="desc">MC 风格平台跳跃小游戏</span>
        </a>
        <a href="typing-tutor/dist/">
            <span class="label">打字练习</span>
            <span class="desc">趣味键盘指法学习</span>
        </a>
    </nav>
    <footer>candiewill.com</footer>
</body>
</html>
